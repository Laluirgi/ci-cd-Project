name: CD Pipeline - Sistem Pengingat Tugas

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Test
        run: npm test

      - name: Build Docker
        run: docker build -t task-reminder-app .

      - name: Deployment Complete
        run: echo "🎉 Sistem Pengingat Tugas berhasil di-deploy ke Production!"
